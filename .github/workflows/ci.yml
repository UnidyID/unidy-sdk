name: CI
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  push:
    branches:
      - master
      - '*-stable'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Linter
    runs-on: [self-hosted, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies (if needed)
        run: bun install
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Lint code
        run: bun lint --error-on-warnings

  e2e:
    name: Playwright Tests
    runs-on: [self-hosted, hetzner]
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install SDK dependencies
        run: bun install
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Install Playwright browsers
        run: bunx playwright install chromium
        working-directory: packages/sdk
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright

      - name: Build SDK
        run: bun run build
        working-directory: packages/sdk

      - name: Configure E2E
        run: bun run e2e:configure
        working-directory: packages/sdk
        env:
          E2E_SDK_BASE_URL: ${{ secrets.E2E_SDK_BASE_URL }}
          E2E_SDK_API_KEY: ${{ secrets.E2E_SDK_API_KEY }}

      - name: Run Playwright tests
        run: bunx playwright test --project=setup --project=chromium
        working-directory: packages/sdk
        env:
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_API_TOKEN: ${{ secrets.E2E_API_TOKEN }}
          PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/sdk/playwright-report/
          retention-days: 30

      - name: Upload test traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: packages/sdk/test-results/
          retention-days: 30
